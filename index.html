<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鎌倉検定３級 一問一答</title>
<style>
:root{--navy:#1a3a5c;--blue:#4A7FBF;--blue-l:#dce9f6;--gold:#c9a84c;--gold-l:#fdf5e0;--green:#3a7d55;--green-l:#e4f3eb;--red:#b83232;--red-l:#fdeaea;--gray:#f2f0ec;--gray2:#e0ddd7;--text:#1e1e1e;--text2:#666;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Helvetica Neue','Hiragino Kaku Gothic ProN','YuGothic',sans-serif;background:#f7f5f1;color:var(--text)}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
/* TOPBAR */
.tb{background:var(--navy);color:#fff;padding:14px 18px 12px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.tb-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:2px 10px 2px 0;line-height:1}
.tb-title{font-size:15px;font-weight:600;letter-spacing:.03em}
.tb-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
/* HOME */
.hero{background:var(--navy);padding:28px 20px 32px;text-align:center}
.kamon{font-size:44px;margin-bottom:10px}
.htitle{font-size:22px;font-weight:700;color:#fff;line-height:1.3}
.htitle span{color:var(--gold)}
.hsub{font-size:12px;color:rgba(255,255,255,.5);margin-top:8px;letter-spacing:.06em}
.hbody{flex:1;padding:20px 18px 32px}
.slabel{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;margin-top:20px}
.slabel:first-child{margin-top:0}
/* RANGE */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rbtn{border:1.5px solid var(--gray2);border-radius:var(--rs);padding:11px 8px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;user-select:none}
.rbtn:active{transform:scale(.97)}
.rbtn.sel{border-color:var(--blue);background:var(--blue-l)}
.rbtn .rl{font-size:13px;font-weight:600;color:var(--text)}
.rbtn .rc{font-size:10px;color:var(--text2);margin-top:3px}
.rbtn.sel .rl{color:var(--navy)}
/* COUNT */
.crow{display:flex;gap:8px}
.cbtn{flex:1;border:1.5px solid var(--gray2);border-radius:var(--rs);padding:11px 4px;text-align:center;cursor:pointer;background:#fff;font-size:14px;font-weight:600;transition:all .15s}
.cbtn.sel{border-color:var(--blue);background:var(--blue-l);color:var(--navy)}
.cbtn:active{transform:scale(.97)}
/* START */
.sbtn{width:100%;margin-top:24px;padding:17px;border-radius:var(--r);border:none;background:var(--navy);color:#fff;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .15s}
.sbtn:active{opacity:.85}
/* QUIZ */
.qbody{flex:1;padding:18px 18px 36px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.progwrap{height:4px;background:var(--gray2);border-radius:2px;margin-bottom:18px}
.progfill{height:100%;border-radius:2px;background:var(--gold);transition:width .4s ease}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.qnum{font-size:12px;color:var(--text2)}
.qperiod{font-size:11px;color:var(--blue);background:var(--blue-l);border-radius:20px;padding:3px 10px;font-weight:600}
.qtext{font-size:15px;line-height:1.75;font-weight:600;color:var(--text);margin-bottom:22px;padding:16px;background:#fff;border-radius:var(--r);border:1px solid var(--gray2)}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{border:1.5px solid var(--gray2);border-radius:var(--r);padding:14px 16px;cursor:pointer;background:#fff;font-size:14px;line-height:1.55;display:flex;align-items:flex-start;gap:12px;transition:border-color .1s,background .1s;user-select:none}
.choice:active{transform:scale(.99)}
.cnum{font-size:12px;font-weight:700;color:var(--text2);min-width:18px;padding-top:1px}
.choice.correct{border-color:var(--green);background:var(--green-l)}
.choice.correct .cnum{color:var(--green)}
.choice.wrong{border-color:var(--red);background:var(--red-l)}
.choice.wrong .cnum{color:var(--red)}
.choice.hl{border-color:var(--green);background:var(--green-l)}
.choice.hl .cnum{color:var(--green)}
.choice.dis{cursor:default}
/* ANSWER BOX */
.abox{margin-top:16px;border-radius:var(--r);padding:14px 16px;font-size:13px;line-height:1.65;display:none}
.abox.show{display:block}
.abox.ok{background:var(--green-l);border:1px solid #a0d4b5;color:#1a4a2a}
.abox.ng{background:var(--red-l);border:1px solid #f0a0a0;color:#5a1a1a}
.ares{font-size:15px;font-weight:700;margin-bottom:4px}
/* NEXT */
.nbtn{width:100%;margin-top:16px;padding:15px;border-radius:var(--r);border:none;background:var(--navy);color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:none}
.nbtn.show{display:block}
.nbtn:active{opacity:.85}
/* RESULT */
.rbody{flex:1;padding:20px 18px 40px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.rscorewrap{background:var(--navy);border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:20px}
.rscore{font-size:56px;font-weight:800;color:#fff;line-height:1}
.rscore span{font-size:20px;color:rgba(255,255,255,.55)}
.rlabel{font-size:13px;color:rgba(255,255,255,.5);margin-top:8px}
.rmsg{font-size:18px;font-weight:700;color:var(--gold);margin-top:12px}
.rstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.scard{background:#fff;border-radius:var(--rs);padding:12px;text-align:center;border:1px solid var(--gray2)}
.sval{font-size:22px;font-weight:700;color:var(--navy)}
.slbl{font-size:10px;color:var(--text2);margin-top:3px}
.rtitle{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;letter-spacing:.04em}
.ritem{background:#fff;border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;border-left:4px solid var(--gray2)}
.ritem.ok{border-left-color:var(--green)}
.ritem.ng{border-left-color:var(--red)}
.rq{font-size:12px;color:var(--text);line-height:1.55;margin-bottom:5px}
.ra{font-size:11px;color:var(--text2)}
.ra b{color:var(--green)}
.wa{color:var(--red);text-decoration:line-through;margin-right:6px}
.rbtns{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.btn-r{padding:15px;border-radius:var(--r);border:none;background:var(--navy);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn-h{padding:15px;border-radius:var(--r);border:1.5px solid var(--navy);background:#fff;color:var(--navy);font-size:15px;font-weight:700;cursor:pointer}
.btn-r:active,.btn-h:active{opacity:.85}
.badge-new{display:inline-block;font-size:10px;background:var(--gold);color:#fff;border-radius:10px;padding:2px 7px;margin-left:6px;font-weight:700;vertical-align:middle}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="hero">
    <div class="kamon">⛩</div>
    <div class="htitle">鎌倉検定<span>３級</span><br>歴史・旧跡　一問一答</div>
    <div class="hsub">第１回〜第19回　340問収録</div>
  </div>
  <div class="hbody">
    <div class="slabel">出題範囲</div>
    <div class="rgrid" id="rgrid"></div>
    <div class="slabel">問題数</div>
    <div class="crow" id="crow">
      <div class="cbtn sel" data-n="10" onclick="selCnt(this)">10問</div>
      <div class="cbtn" data-n="20" onclick="selCnt(this)">20問</div>
      <div class="cbtn" data-n="30" onclick="selCnt(this)">30問</div>
      <div class="cbtn" data-n="0" onclick="selCnt(this)">全問</div>
    </div>
    <button class="sbtn" onclick="startQuiz()">はじめる　▶</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="s-quiz">
  <div class="tb">
    <button class="tb-back" onclick="goHome()">✕</button>
    <div>
      <div class="tb-title">鎌倉検定３級</div>
      <div class="tb-sub" id="qt-sub"></div>
    </div>
  </div>
  <div class="qbody" id="qbody">
    <div class="progwrap"><div class="progfill" id="pfill"></div></div>
    <div class="qmeta">
      <div class="qnum" id="qnum"></div>
      <div class="qperiod" id="qperiod"></div>
    </div>
    <div class="qtext" id="qtext"></div>
    <div class="choices" id="choices"></div>
    <div class="abox" id="abox">
      <div class="ares" id="ares"></div>
      <div id="adetail"></div>
    </div>
    <button class="nbtn" id="nbtn" onclick="nextQ()"></button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="s-result">
  <div class="tb">
    <button class="tb-back" onclick="goHome()">✕</button>
    <div><div class="tb-title">結果</div></div>
  </div>
  <div class="rbody" id="rbody"></div>
</div>

<script>
const QS = [{"year": 2025, "vol": 19, "q": "1081年（永保元），由比若宮の社殿を修理した人物はだれか。", "c": ["源頼信", "源頼義", "源義家", "源頼光"], "a": 2}, {"year": 2025, "vol": 19, "q": "2代将軍の外戚となり，権力を振るったが，北条氏討伐の企てが北条政子に知られ，名越の北条邸で謀殺された人物はだれか。", "c": ["安達盛長", "三浦義澄", "阿野全成", "比企能員"], "a": 3}, {"year": 2025, "vol": 19, "q": "1213年（建保元），北条義時の挑発によって兵を挙げ，一族とともに由比ヶ浜で滅亡した人物はだれか。", "c": ["三浦義村", "和田義盛", "畠山重忠", "梶原景時"], "a": 1}, {"year": 2025, "vol": 19, "q": "源頼朝以来の先例や武家社会の慣習を基とした日本最初の武家成文法である御成敗式目（貞永式目）を定めた人物はだれか。", "c": ["北条泰時", "北条義時", "北条経時", "北条時頼"], "a": 0}, {"year": 2025, "vol": 19, "q": "北条氏（得宗）の権力をさらに強固にするために，5代執権北条時頼が三浦泰村とその一族を滅ぼしたできごとを何というか。", "c": ["霜月騒動", "宝治合戦", "承久の乱", "弘安の役"], "a": 1}, {"year": 2025, "vol": 19, "q": "1335年（建武2），北条高時の子である時行が鎌倉政権復活を図って挙兵し，足利直義を破って一時的に鎌倉を支配下に置いたできごとを何というか。", "c": ["中先代の乱", "正中の変", "承久の乱", "霜月騒動"], "a": 0}, {"year": 2025, "vol": 19, "q": "1561年（永禄4）に関東管領職を鶴岡八幡宮寺の神前で譲られた戦国武将はだれか。", "c": ["今川義元", "北条氏康", "長尾景虎", "武田信玄"], "a": 2}, {"year": 2025, "vol": 19, "q": "1674年（延宝2）に徳川光圀が鎌倉入りした際に宿舎として利用した寺院はどこか。", "c": ["浄妙寺", "薬王寺", "壽福寺", "英勝寺"], "a": 3}, {"year": 2025, "vol": 19, "q": "明治時代に，「鎌倉は保養地として最適な地である」と紹介した人物はだれか。", "c": ["北里柴三郎", "長与専斎", "ロベルト・コッホ", "エルウィン・ベルツ"], "a": 3}, {"year": 2025, "vol": 19, "q": "1889年（明治22）のできごとで，鎌倉が保養地・別荘地としてさらに発展するきっかけとなったのは何か。", "c": ["横須賀線の大船―横須賀間開通", "江ノ島電鉄の全線開通", "自動車専用道路の大船―片瀬間開通", "湘南有料道路の開通"], "a": 0}, {"year": 2025, "vol": 19, "q": "由比ヶ浜は鎌倉時代に何と呼ばれていたか。", "c": ["西浜", "東浜", "上浜", "前浜"], "a": 3}, {"year": 2025, "vol": 19, "q": "鎌倉の各地に残る「やぐら」とは何か。", "c": ["敵の襲来を見張るための物見の塔", "予備の生活用具や武具をしまっておくための倉庫", "丘陵の山腹を穿って造られた仏堂的横穴墳墓", "敵の襲来時や災害時の避難場所"], "a": 2}, {"year": 2025, "vol": 19, "q": "源氏三代と尼将軍とも呼ばれた北条政子の時代に，幕府が置かれた場所とされる旧跡はどこか。", "c": ["宇津宮辻子幕府跡", "大倉幕府跡", "若宮大路幕府跡", "由比若宮幕府跡"], "a": 1}, {"year": 2025, "vol": 19, "q": "今は度重なる火災などで失われたが，奥州藤原氏が築いた平泉の中尊寺の二階大堂（大長寿院）を模して源頼朝が創建した永福寺があったのはどこか。", "c": ["鎌倉宮裏手", "大倉幕府跡の裏山", "八雲神社（大町）付近", "極楽寺坂"], "a": 0}, {"year": 2025, "vol": 19, "q": "鶴岡八幡宮が幕末まで鶴岡八幡宮寺であったことを示す旧跡は何か。", "c": ["法華堂跡", "大倉幕府跡", "二十五坊跡", "太平寺跡"], "a": 2}, {"year": 2025, "vol": 19, "q": "梶原太刀洗水は，梶原景時がある武将を斬った太刀の血のりを洗い流したという湧き水であるが，その武将はだれか。", "c": ["平賀朝雅", "大庭景親", "上総介広常", "平宗盛"], "a": 2}, {"year": 2025, "vol": 19, "q": "佐助の銭洗水で金銭を洗うと特に福利が増すといわれているのは何の日か。", "c": ["辰の日", "酉の日", "寅の日", "巳の日"], "a": 3}, {"year": 2025, "vol": 19, "q": "『吾妻鏡』に記された「前奥州禅門」とはだれのことか。", "c": ["北条時政", "北条義時", "北条重時", "北条泰時"], "a": 1}, {"year": 2025, "vol": 19, "q": "鎌倉と金沢八景を結び，鎌倉の東側の守備を担ったと考えられる切通はどこか。", "c": ["釈迦堂切通", "朝夷奈切通", "極楽寺切通", "名越切通"], "a": 1}, {"year": 2025, "vol": 19, "q": "鎌倉の名の由来の一つとして，中臣鎌足が夢のお告げで護身用に持参した鎌を埋めたとされる場所はどこか。", "c": ["松ヶ岡", "扇ヶ谷", "二階堂", "西御門"], "a": 0}, {"year": 2024, "vol": 18, "q": "源義朝の「鎌倉之楯」跡は今のどこの付近にあったとされるか。", "c": ["浄智寺", "長壽寺", "海蔵寺", "壽福寺"], "a": 3}, {"year": 2024, "vol": 18, "q": "平家方の武将だったが，石橋山合戦で源頼朝を助け，信任を得た御家人はだれか。", "c": ["畠山重忠", "比企能員", "梶原景時", "千葉常胤"], "a": 2}, {"year": 2024, "vol": 18, "q": "鎌倉幕府第2代執権に就任し，執権政治の基礎を築いた人物はだれか。", "c": ["北条時政", "北条時頼", "北条経時", "北条義時"], "a": 3}, {"year": 2024, "vol": 18, "q": "右大臣拝賀の儀の帰途，鶴岡八幡宮境内で甥の公暁に暗殺された人物はだれか。", "c": ["源為義", "源範頼", "源頼家", "源実朝"], "a": 3}, {"year": 2024, "vol": 18, "q": "承久の乱に際して源頼朝の御恩を説き，御家人を激励したと伝えられる人物はだれか。", "c": ["北条時政", "北条義時", "北条政子", "北条泰時"], "a": 2}, {"year": 2024, "vol": 18, "q": "鎌倉幕府関係者が編纂したといわれる，1180年から1266年に至る歴史書を何というか。", "c": ["今鏡", "増鏡", "吾妻鏡", "大鏡"], "a": 2}, {"year": 2024, "vol": 18, "q": "1274年と1281年の二度にわたり元軍が攻めてきたときの執権はだれか。", "c": ["北条長時", "北条政村", "北条時宗", "北条貞時"], "a": 2}, {"year": 2024, "vol": 18, "q": "1363年に足利基氏の補佐役として，初代に上杉憲顕が任命された職制を何というか。", "c": ["執権", "関東管領", "連署", "内管領"], "a": 1}, {"year": 2024, "vol": 18, "q": "鎌倉が保養地・別荘地として発展するきっかけとなった，大船と横須賀間の横須賀線開通はいつのことか。", "c": ["1889年（明治22）", "1910年（明治43）", "1930年（昭和5）", "1956年（昭和31）"], "a": 0}, {"year": 2024, "vol": 18, "q": "1939年に鎌倉市が誕生したのは，鎌倉町とどこが合併したためか。", "c": ["深沢村", "大船町", "腰越町", "小坂村"], "a": 2}, {"year": 2024, "vol": 18, "q": "現存する日本最古の築港遺跡である和賀江嶋の「和賀」とはどこの古名か。", "c": ["七里ヶ浜", "腰越", "稲村ヶ崎", "材木座"], "a": 3}, {"year": 2024, "vol": 18, "q": "鎌倉にあるほぼすべての 007, "vol": 1, "q": "鎌倉市が市制50周年を迎えたのはいつか。", "c": ["1989年（平成元）", "1979年（昭和54）", "1969年（昭和44）", "1959年（昭和34）"], "a": 0}, {"year": 2007, "vol": 1, "q": "大船と横須賀間に横須賀線が開通したのはいつか。", "c": ["1887年（明治20）", "1888年（明治21）", "1889年（明治22）", "1902年（明治35）"], "a": 2}, {"year": 2007, "vol": 1, "q": "由比ヶ浜の辺りに宿泊したときに，夢のお告げで護身用に持参した鎌を大倉の松ヶ岡に埋めたという伝説があり，鎌倉の名の由来の一つとされる人物はだれか。", "c": ["藤原鎌足", "日本武尊", "坂上田村麻呂", "柿本人麻呂"], "a": 0}, {"year": 2007, "vol": 1, "q": "今は度重なる火災などで失われたが，奥州藤原氏の築いた平泉の中尊寺や毛越寺を模して源頼朝が造営したという壮大な寺の旧跡はどこか。", "c": ["勝長寿院跡", "永福寺跡", "東勝寺跡", "太平（高松）寺跡"], "a": 1}, {"year": 2007, "vol": 1, "q": "鎌倉の各地に残る「やぐら」とは何か。", "c": ["敵の襲来を見張る物見の塔", "供養塔を建てたり骨を納めるための墳墓", "予備の生活用具をしまっておく倉庫", "敵の襲来や災害時の避難場所"], "a": 1}, {"year": 2007, "vol": 1, "q": "最後の得宗北条高時主従が自害して鎌倉幕府が滅んだと伝えられ，通称「腹切りやぐら」が今に残されている所はどこか。", "c": ["十一人塚", "北条氏常磐亭跡", "宇津宮辻子幕府跡", "東勝寺跡"], "a": 3}, {"year": 2007, "vol": 1, "q": "源頼朝が鎌倉で最初に政務を行っていた場所とされる旧跡はどこか。", "c": ["大倉幕府跡", "宇津宮辻子幕府跡", "若宮大路幕府跡", "由比若宮幕府跡"], "a": 0}, {"year": 2007, "vol": 1, "q": "源頼朝の墓や北条義時の墓所の遺構がある旧跡はどこか。", "c": ["勝長寿院跡", "太平（高松）寺跡", "大倉幕府跡", "法華堂跡"], "a": 3}, {"year": 2007, "vol": 1, "q": "松葉ヶ谷の法難のとき，名越切通につづく裏山で日蓮を助けた動物は何か。", "c": ["ハト", "サル", "リス", "タヌキ"], "a": 1}, {"year": 2007, "vol": 1, "q": "上総介広常を討った太刀の血のりを，朝夷奈切通のある谷間から湧き出す水で洗ったという伝説がある武将はだれか。", "c": ["三浦義村", "安達泰盛", "梶原景時", "和田義盛"], "a": 2}, {"year": 2007, "vol": 1, "q": "後北条氏によって築かれ，16世紀末，秀吉配下の徳川家康の説得で無血開城するまで難攻不落であった城址はどこか。", "c": ["住吉城址", "杉本城址", "玉縄城址", "天神山城址"], "a": 2}, {"year": 2007, "vol": 1, "q": "1910年（明治43），七里ヶ浜沖でボート遭難したのはどこの学校の生徒か（稲村ヶ崎にその追悼碑がある）。", "c": ["逗子開成中学", "鎌倉学園", "栄光学園", "鎌倉高校"], "a": 0}, {"year": 2007, "vol": 1, "q": "明治時代，鎌倉には御用邸があり，皇族が避暑に訪れた。その御用邸の門は今も残っているが，どこにあるか。", "c": ["鎌倉市役所", "御成通り（鎌倉銀座）", "御成中学校", "御成小学校"], "a": 3}];

const RANGES = [
  {id:'all',   label:'全回',       sub:'第1〜19回', badge:'',    fn: q=>true},
  {id:'late',  label:'第11回以降', sub:'第11〜19回',badge:'NEW', fn: q=>q.vol>=11},
  {id:'r15',   label:'第15回以降', sub:'第15〜19回',badge:'',    fn: q=>q.vol>=15},
  {id:'early', label:'第1〜10回',  sub:'第1〜10回', badge:'',    fn: q=>q.vol<=10},
  {id:'kamakura', label:'鎌倉時代', sub:'武家・幕府',badge:'',   fn: q=>true},
  {id:'r17',   label:'第17〜19回', sub:'最新3回分', badge:'HOT', fn: q=>q.vol>=17},
];

let selRange='late', selCnt=10;
let quiz=[], idx=0, ans=[], answered=false;

function init(){
  const g=document.getElementById('rgrid');
  RANGES.forEach(r=>{
    const cnt=QS.filter(r.fn).length;
    const d=document.createElement('div');
    d.className='rbtn'+(r.id===selRange?' sel':'');
    d.dataset.id=r.id;
    const badge=r.badge?`<span class="badge-new">${r.badge}</span>`:'';
    d.innerHTML=`<div class="rl">${r.label}${badge}</div><div class="rc">${r.sub}（${cnt}問）</div>`;
    d.onclick=()=>selRange_(r.id);
    g.appendChild(d);
  });
}

function selRange_(id){
  selRange=id;
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.toggle('sel',b.dataset.id===id));
}

function selCnt(el){
  selCnt=parseInt(el.dataset.n);
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}

function startQuiz(){
  const r=RANGES.find(x=>x.id===selRange);
  let pool=QS.filter(r.fn).sort(()=>Math.random()-.5);
  quiz=selCnt===0?pool:pool.slice(0,Math.min(selCnt,pool.length));
  idx=0; ans=[];
  showS('s-quiz');
  renderQ();
}

function renderQ(){
  answered=false;
  const q=quiz[idx], tot=quiz.length;
  document.getElementById('pfill').style.width=`${idx/tot*100}%`;
  document.getElementById('qnum').textContent=`${idx+1} / ${tot}`;
  const ptext=`第${q.vol}回（${q.year}年）`;
  document.getElementById('qperiod').textContent=ptext;
  document.getElementById('qt-sub').textContent=ptext;
  document.getElementById('qtext').textContent=q.q;

  const ce=document.getElementById('choices');
  ce.innerHTML='';
  q.c.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='choice';
    d.innerHTML=`<span class="cnum">${i+1}</span><span>${c}</span>`;
    d.onclick=()=>selAns(i);
    ce.appendChild(d);
  });

  document.getElementById('abox').className='abox';
  const nb=document.getElementById('nbtn');
  nb.className='nbtn';
  document.getElementById('qbody').scrollTop=0;
}

function selAns(i){
  if(answered)return;
  answered=true;
  const q=quiz[idx];
  const ok=i===q.a;
  ans.push({q,chosen:i,correct:q.a,ok});

  document.querySelectorAll('.choice').forEach((d,ci)=>{
    d.classList.add('dis');
    if(ci===i&&ok) d.classList.add('correct');
    else if(ci===i&&!ok) d.classList.add('wrong');
    if(ci===q.a&&!ok) d.classList.add('hl');
  });

  const ab=document.getElementById('abox');
  ab.className='abox show '+(ok?'ok':'ng');
  document.getElementById('ares').textContent=ok?'✓ 正解！':'✗ 不正解';
  document.getElementById('adetail').textContent=ok
    ?`「${q.c[q.a]}」が正解です。`
    :`正解は「${q.c[q.a]}」でした。`;

  const nb=document.getElementById('nbtn');
  nb.className='nbtn show';
  nb.textContent=idx+1<quiz.length?'次の問題 →':'結果を見る';
}

function nextQ(){
  idx++;
  if(idx<quiz.length) renderQ();
  else showResult();
}

function showResult(){
  showS('s-result');
  const ok=ans.filter(a=>a.ok).length;
  const tot=ans.length;
  const pct=Math.round(ok/tot*100);
  const msg=pct===100?'🎉 満点！完璧です！':pct>=80?'🌸 素晴らしい！':pct>=60?'👍 合格ライン！':'📖 もう一度挑戦！';
  const ng=ans.filter(a=>!a.ok);

  let h=`
  <div class="rscorewrap">
    <div class="rscore">${ok}<span> / ${tot}</span></div>
    <div class="rlabel">正解数　（正答率 ${pct}%）</div>
    <div class="rmsg">${msg}</div>
  </div>
  <div class="rstats">
    <div class="scard"><div class="sval" style="color:var(--green)">${ok}</div><div class="slbl">正解</div></div>
    <div class="scard"><div class="sval" style="color:var(--red)">${ng.length}</div><div class="slbl">不正解</div></div>
    <div class="scard"><div class="sval">${pct}%</div><div class="slbl">正答率</div></div>
  </div>`;

  if(ng.length>0){
    h+=`<div class="rtitle">⚡ 間違えた問題（${ng.length}問）</div>`;
    ng.forEach(a=>{
      h+=`<div class="ritem ng">
        <div class="rq">${a.q.q}</div>
        <div class="ra"><span class="wa">✗ ${a.q.c[a.chosen]}</span><b>✓ ${a.q.c[a.correct]}</b></div>
      </div>`;
    });
  } else {
    h+=`<div class="ritem ok"><div class="rq">全問正解！すべての問題に正解しました 🎊</div></div>`;
  }

  h+=`<div class="rbtns">
    ${ng.length>0?`<button class="btn-r" onclick="retryNG()">間違えた問題をもう一度（${ng.length}問）</button>`:''}
    <button class="btn-r" onclick="startQuiz()">同じ設定でやり直す</button>
    <button class="btn-h" onclick="goHome()">出題範囲を変える</button>
  </div>`;

  document.getElementById('rbody').innerHTML=h;
}

function retryNG(){
  quiz=ans.filter(a=>!a.ok).map(a=>a.q).sort(()=>Math.random()-.5);
  idx=0; ans=[];
  showS('s-quiz');
  renderQ();
}

function showS(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome(){showS('s-home');}

init();
</script>

</html>
